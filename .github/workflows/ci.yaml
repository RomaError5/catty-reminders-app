name: CI

on:
  push:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: mypass
          MYSQL_DATABASE: catty_reminders
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python interpreter
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt pytest pytest-playwright mysql-connector-python
          playwright install chromium

      - name: Launch web application
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: mypass
          MYSQL_DATABASE: catty_reminders
        run: |
          echo '{
            "secret_key": "Cats are awesome!",
            "users": {
              "heisenberg": "P@ssw0rd",
              "tester": "foobar123"
            },
            "db_config": {
              "host": "'$MYSQL_HOST'",
              "port": '$MYSQL_PORT',
              "user": "'$MYSQL_USER'",
              "password": "'$MYSQL_PASSWORD'",
              "database": "'$MYSQL_DATABASE'"
            }
          }' > config.json
          uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          for attempt in {1..20}; do
            curl -s http://127.0.0.1:8181 && break
            sleep 1
          done

      - name: Execute pytest suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -v --tb=short --junitxml=test_result.xml

      - name: Store test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: romaerror5
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Package and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/romaerror5/catty-reminders-app:${{ github.sha }}
          build-args: |
            DEPLOY_REF=${{ github.sha }}