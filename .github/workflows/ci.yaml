name: CI

on:
  push:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: catty
          POSTGRES_PASSWORD: catty_password
          POSTGRES_DB: catty
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python interpreter
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt pytest pytest-playwright
          playwright install chromium

      - name: Launch web application
        env:
          DATABASE_URL: postgresql://catty:catty_password@localhost:5432/catty
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          for attempt in {1..20}; do
            curl -s http://127.0.0.1:8181 && break
            sleep 1
          done

      - name: Execute pytest suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -v --tb=short --junitxml=test_result.xml

      - name: Store test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: romaerror5
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Package and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/romaerror5/catty-reminders-app:${{ github.sha }}
          build-args: |
            DEPLOY_REF=${{ github.sha }}