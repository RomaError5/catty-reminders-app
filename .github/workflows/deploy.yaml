name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3154
          username: romaerror5
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u RomaError5 --password-stdin
            docker stop catty-container || true
            docker rm catty-container || true
            docker pull ghcr.io/romaerror5/catty-reminders-app:${{ github.sha }}
            docker run -d --name catty-container -p 8181:8181 \
              ghcr.io/romaerror5/catty-reminders-app:${{ github.sha }}